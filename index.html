<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8xgl</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060608;
    color: #fff;
    font-family: 'Syne', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .name {
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #fff;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-bottom: 52px;
    animation: fadeUp 1.2s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 220px;
  }

  .link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: rgba(255,255,255,0.55);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 13px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    background: rgba(255,255,255,0.03);
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    backdrop-filter: blur(8px);
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .link:nth-child(1) { animation-delay: 0.25s; }
  .link:nth-child(2) { animation-delay: 0.35s; }
  .link:nth-child(3) { animation-delay: 0.45s; }

  .link:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.07);
  }

  .link svg {
    opacity: 0.4;
    transition: opacity 0.2s;
  }

  .link:hover svg { opacity: 1; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="container">
  <div class="name">8xgl</div>
  <div class="tagline">we all serve a purpose to die</div>

  <div class="links">
    <a class="link" href="https://discord.com/users/8xgl" target="_blank" rel="noopener">
      Discord
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="link" href="https://t.me/hargw" target="_blank" rel="noopener">
      Telegram
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="link" href="https://crime.bio/us" target="_blank" rel="noopener">
      Crime.bio
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, dots;

const DOTS = 88;
const MAX_DIST = 145;
const DOT_COLOR = 'rgba(255,255,255,';

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initDots() {
  dots = Array.from({ length: DOTS }, () => ({
    x:  Math.random() * W,
    y:  Math.random() * H,
    vx: (Math.random() - 0.5) * 0.45,
    vy: (Math.random() - 0.5) * 0.45,
    r:  Math.random() * 1.5 + 1
  }));
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < dots.length; i++) {
    const d = dots[i];
    d.x += d.vx;
    d.y += d.vy;
    if (d.x < 0 || d.x > W) d.vx *= -1;
    if (d.y < 0 || d.y > H) d.vy *= -1;

    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = DOT_COLOR + '0.55)';
    ctx.fill();

    for (let j = i + 1; j < dots.length; j++) {
      const b = dots[j];
      const dx = d.x - b.x;
      const dy = d.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MAX_DIST) {
        const alpha = (1 - dist / MAX_DIST) * 0.18;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = DOT_COLOR + alpha + ')';
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); initDots(); });
resize();
initDots();
draw();
</script>
</body>
</html>
