<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>looking for online work?</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  canvas#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  canvas#lines {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .arch-corner {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.5rem;
  }

  .arch-logo {
    display: block;
    filter: drop-shadow(0 0 6px #00e5cc) drop-shadow(0 0 16px rgba(0,229,204,0.5));
    animation: archPulse 3s ease-in-out infinite;
  }

  @keyframes archPulse {
    0%, 100% { filter: drop-shadow(0 0 6px #00e5cc) drop-shadow(0 0 16px rgba(0,229,204,0.5)); }
    50% { filter: drop-shadow(0 0 12px #00e5cc) drop-shadow(0 0 30px rgba(0,229,204,0.8)) drop-shadow(0 0 50px rgba(0,229,204,0.35)); }
  }

  .arch-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.03em;
    text-align: right;
    max-width: 220px;
    line-height: 1.5;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    padding: 2rem;
    text-align: center;
  }

  .headline {
    font-size: clamp(1rem, 3vw, 1.35rem);
    font-weight: 400;
    color: #c9c9c9;
    letter-spacing: 0.04em;
    line-height: 1.7;
  }

  .headline a {
    color: #e8e8e8;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    transition: color 0.2s, border-color 0.2s;
    font-weight: 700;
  }

  .headline a:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.7);
  }

  .uuid-wrapper {
    perspective: 800px;
  }

  .uuid-box {
    position: relative;
    padding: 1rem 2rem;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
    transform-style: preserve-3d;
    will-change: transform;
    transform: rotateX(0deg) rotateY(0deg);
    user-select: none;
  }

  .uuid-box:hover {
    border-color: rgba(255,255,255,0.28);
    background: rgba(255,255,255,0.07);
  }

  .uuid-text {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.75rem, 2vw, 0.9rem);
    color: #a0a0a0;
    letter-spacing: 0.08em;
    filter: blur(6px);
    transition: filter 0.3s;
    pointer-events: none;
  }

  .uuid-box:hover .uuid-text {
    filter: blur(0px);
    color: #d4d4d4;
  }

  .uuid-hint {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.2);
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 0.3s;
    opacity: 0;
  }

  .uuid-box:hover .uuid-hint {
    opacity: 1;
  }

  .copied-flash {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .uuid-box.flash .copied-flash {
    opacity: 1;
  }

  .copied-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .uuid-box.flash .copied-label {
    opacity: 1;
  }

  .uuid-box.flash .uuid-text,
  .uuid-box.flash .uuid-hint {
    opacity: 0;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="lines"></canvas>
<div class="vignette"></div>

<div class="arch-corner">
  <canvas id="archCanvas" class="arch-logo"></canvas>
  <p class="arch-text">whoever deleted my webhook, thanks i was going to delete it soon.</p>
</div>

<div class="content">
  <p class="headline">
    looking for online work? dm
    <a href="https://discord.com/users/8xgl" target="_blank" rel="noopener">@8xgl</a>
    on discord this key.
  </p>

  <div class="uuid-wrapper" id="uuidWrapper">
    <div class="uuid-box" id="uuidBox" title="click to copy">
      <div class="uuid-text" id="uuidText"></div>
      <div class="uuid-hint">click to copy</div>
      <div class="copied-flash"></div>
      <div class="copied-label">copied</div>
    </div>
  </div>
</div>

<script>
  /* ---------- stars ---------- */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 5000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 0.9 + 0.1,
        a: Math.random(),
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  let frame = 0;
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    for (const s of stars) {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(frame * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  drawStars();
  window.addEventListener('resize', () => { resize(); initStars(); });

  /* ---------- moving lines ---------- */
  const lcanvas = document.getElementById('lines');
  const lctx = lcanvas.getContext('2d');
  let nodes = [];

  function lresize() {
    lcanvas.width = window.innerWidth;
    lcanvas.height = window.innerHeight;
  }

  function initNodes() {
    nodes = [];
    const count = Math.floor((lcanvas.width * lcanvas.height) / 18000);
    for (let i = 0; i < Math.max(count, 28); i++) {
      nodes.push({
        x: Math.random() * lcanvas.width,
        y: Math.random() * lcanvas.height,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
      });
    }
  }

  const LINE_DIST = 160;

  function drawLines() {
    lctx.clearRect(0, 0, lcanvas.width, lcanvas.height);
    for (const n of nodes) {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > lcanvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > lcanvas.height) n.vy *= -1;
    }
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < LINE_DIST) {
          const alpha = (1 - dist / LINE_DIST) * 0.35;
          lctx.beginPath();
          lctx.moveTo(nodes[i].x, nodes[i].y);
          lctx.lineTo(nodes[j].x, nodes[j].y);
          lctx.strokeStyle = `rgba(180,140,255,${alpha})`;
          lctx.lineWidth = 1.3;
          lctx.stroke();
        }
      }
    }
    for (const n of nodes) {
      lctx.beginPath();
      lctx.arc(n.x, n.y, 1.5, 0, Math.PI * 2);
      lctx.fillStyle = 'rgba(180,140,255,0.5)';
      lctx.fill();
    }
    requestAnimationFrame(drawLines);
  }

  lresize();
  initNodes();
  drawLines();
  window.addEventListener('resize', () => { lresize(); initNodes(); });

  /* ---------- UUID v4 ---------- */
  function uuidv4() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
    );
  }

  const uuid = uuidv4();
  document.getElementById('uuidText').textContent = uuid;

  /* ---------- tilt ---------- */
  const wrapper = document.getElementById('uuidWrapper');
  const box = document.getElementById('uuidBox');
  let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
  let animating = false;
  let isHovering = false;

  wrapper.addEventListener('mousemove', (e) => {
    const rect = box.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    targetY = dx * 18;
    targetX = -dy * 18;
    isHovering = true;
    if (!animating) animate();
  });

  wrapper.addEventListener('mouseleave', () => {
    targetX = 0;
    targetY = 0;
    isHovering = false;
  });

  function animate() {
    animating = true;
    currentX += (targetX - currentX) * 0.12;
    currentY += (targetY - currentY) * 0.12;
    box.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg) scale(${isHovering ? 1.03 : 1})`;
    if (Math.abs(currentX - targetX) > 0.01 || Math.abs(currentY - targetY) > 0.01) {
      requestAnimationFrame(animate);
    } else {
      animating = false;
    }
  }

  /* ---------- arch ascii logo ---------- */
  (function() {
    const lines = [
      "          -          ",
      "         `o+`        ",
      "        `ooo/        ",
      "       `+0000:       ",
      "      `+000000:      ",
      "      -+000000+:     ",
      "     `/:·++0000+:    ",
      "    `/++++/++++++++: ",
      "   `/+++++++++++++++:",
      "  `+++0000000000000/`",
      " ./000SSSSO++0SSSSSSO+`",
      " ,00SSSSSO-````/0SSSSS+`",
      " -0SSSSSSO.    :SSSSSS0.",
      " :0SSSSSSS/    0SSSO+++.",
      " /0SSSSSSSS/   +SSS000/-",
      "`0SSSSSO+/:-   -:/+0SSSO+-",
      "`+SS0+:-           .-/+0S0:",
      "++:,                  -/+/ ",
    ];

    const fs = 11;
    const lh = 13;
    const ac = document.createElement('canvas');
    const ax = ac.getContext('2d');
    ax.font = `${fs}px monospace`;
    const cw = ax.measureText('M').width;

    const maxLen = Math.max(...lines.map(l => l.length));
    ac.width  = Math.ceil(maxLen * cw) + 10;
    ac.height = lines.length * lh + 8;

    ax.font = `${fs}px monospace`;
    ax.fillStyle = '#00e5cc';
    ax.textAlign = 'center';
    const midX = ac.width / 2;
    lines.forEach((line, i) => {
      ax.fillText(line, midX, (i + 1) * lh);
    });

    const archEl = document.getElementById('archCanvas');
    archEl.width  = ac.width;
    archEl.height = ac.height;
    archEl.getContext('2d').drawImage(ac, 0, 0);
  })();
  box.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(uuid);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = uuid;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    box.classList.add('flash');
    setTimeout(() => box.classList.remove('flash'), 900);
  });
</script>
</body>
</html>
