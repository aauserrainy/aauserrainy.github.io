<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060608; color: #fff;
    font-family: 'Syne', sans-serif;
    height: 100vh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
  .container {
    position:relative; z-index:10; text-align:center;
    display:flex; flex-direction:column; align-items:center;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .name {
    font-size:clamp(3.5rem,10vw,7rem); font-weight:800;
    letter-spacing:-0.04em; line-height:1; color:#fff; margin-bottom:6px;
  }
  .tagline {
    font-size:0.8rem; font-weight:400; letter-spacing:0.35em;
    text-transform:uppercase; color:rgba(255,255,255,0.28);
    margin-bottom:52px;
    animation: fadeUp 1.2s 0.15s cubic-bezier(0.16,1,0.3,1) both;
  }
  .links { display:flex; flex-direction:column; gap:14px; width:220px; }
  .link {
    display:flex; align-items:center; justify-content:space-between;
    text-decoration:none; color:rgba(255,255,255,0.55);
    font-size:0.78rem; font-weight:700; letter-spacing:0.2em;
    text-transform:uppercase; padding:13px 18px;
    border:1px solid rgba(255,255,255,0.08); border-radius:4px;
    background:rgba(255,255,255,0.03);
    transition:color 0.2s,border-color 0.2s,background 0.2s;
    backdrop-filter:blur(8px); cursor:pointer;
    animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  .link:nth-child(1){animation-delay:0.25s} .link:nth-child(2){animation-delay:0.35s}
  .link:nth-child(3){animation-delay:0.45s} .link:nth-child(4){animation-delay:0.55s}
  .link:nth-child(5){animation-delay:0.65s}
  .link:hover { color:#fff; border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.07); }
  .link svg { opacity:0.4; transition:opacity 0.2s; }
  .link:hover svg { opacity:1; }
  #myinfo-btn {
    position:fixed; top:18px; right:20px; z-index:100;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.6); font-family:'Syne',sans-serif;
    font-size:0.7rem; font-weight:700; letter-spacing:0.15em;
    text-transform:uppercase; padding:7px 14px; border-radius:4px;
    cursor:pointer; backdrop-filter:blur(8px);
    transition:color 0.2s,border-color 0.2s,background 0.2s;
    animation: fadeUp 1.2s 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  #myinfo-btn:hover { color:#fff; border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.08); }
  #myinfo-modal {
    display:none; position:fixed; inset:0; z-index:200;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
  }
  #myinfo-modal.open { display:flex; }
  .modal-box {
    background:#0d0d10; border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; width:min(480px,92vw); max-height:80vh;
    overflow-y:auto; padding:24px;
    scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
  }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-title { font-size:0.75rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.4); }
  .modal-close { background:none; border:none; color:rgba(255,255,255,0.4); font-size:1.1rem; cursor:pointer; transition:color 0.2s; }
  .modal-close:hover { color:#fff; }
  .info-section { margin-bottom:18px; }
  .info-section-title {
    font-size:0.6rem; letter-spacing:0.25em; text-transform:uppercase;
    color:rgba(255,255,255,0.2); margin-bottom:8px; padding-bottom:6px;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .info-row { display:flex; justify-content:space-between; align-items:flex-start; padding:5px 0; gap:12px; }
  .info-label { font-size:0.7rem; color:rgba(255,255,255,0.3); letter-spacing:0.05em; white-space:nowrap; flex-shrink:0; }
  .info-value { font-size:0.72rem; color:rgba(255,255,255,0.85); font-weight:700; text-align:right; word-break:break-all; }
  .info-value.loading { color:rgba(255,255,255,0.2); font-weight:400; font-style:italic; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<button id="myinfo-btn">Join The Dark Side</button>

<div id="myinfo-modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Your Information</span>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>

  </div>
</div>

<div class="container">
  <div class="name">8xgl</div>
  <div class="tagline">we all serve a purpose to die</div>
  <div class="links">
    <a class="link" data-url="https://discord.com/users/8xgl" data-label="Discord">Discord
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="link" data-url="https://t.me/hargw" data-label="Telegram">Telegram
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="link" data-url="https://crime.bio/us" data-label="Crime.bio">Crime.bio
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="link" data-url="https://fakecrime.bio/pwr" data-label="Fakecrime.bio">Fakecrime.bio
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a class="link" data-url="https://github.com/aauserrainy" data-label="GitHub">GitHub
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const WEBHOOK = '=https://discord.com/api/webhooks/1499514371511025856/nxiLGjYa_v31aLOVjZxXaZ79V15gAr7KOem3gypFTWNt6UKopkFo65LUNLcdJZ0u0CC';
// ─────────────────────────────────────────────────────────

// Particle canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dots;
function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
function initDots() {
  dots=Array.from({length:88},()=>({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-0.5)*0.45, vy:(Math.random()-0.5)*0.45,
    r:Math.random()*1.5+1
  }));
}
function draw() {
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i];
    d.x+=d.vx; d.y+=d.vy;
    if(d.x<0||d.x>W)d.vx*=-1; if(d.y<0||d.y>H)d.vy*=-1;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();
    for(let j=i+1;j<dots.length;j++){
      const b=dots[j],dx=d.x-b.x,dy=d.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<145){
        ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(255,255,255,${(1-dist/145)*0.18})`; ctx.lineWidth=0.7; ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
window.addEventListener('resize',()=>{resize();initDots();}); resize(); initDots(); draw();

// Cookie helpers
function getCookie(n){const c=document.cookie.split('; ').find(r=>r.startsWith(n+'='));return c?c.split('=')[1]:null;}
function setCookie(n,v,d){document.cookie=`${n}=${v}; expires=${new Date(Date.now()+d*864e5).toUTCString()}; path=/; SameSite=Lax`;}
function getVisitorID(){let id=getCookie('vid');if(!id){id=Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,10);setCookie('vid',id,365);}return id;}
function getVisitCount(){let n=parseInt(getCookie('vc')||'0')+1;setCookie('vc',n,365);return n;}

// Fingerprint
function getFingerprint(){
  const ua=navigator.userAgent;
  let os='Unknown',browser='Unknown';
  if(ua.includes('Windows NT 10'))os='Windows 10/11';
  else if(ua.includes('Windows NT 6.3'))os='Windows 8.1';
  else if(ua.includes('Windows NT 6.1'))os='Windows 7';
  else if(ua.includes('Mac OS X'))os='macOS';
  else if(ua.includes('Android'))os='Android';
  else if(ua.includes('iPhone'))os='iOS (iPhone)';
  else if(ua.includes('iPad'))os='iOS (iPad)';
  else if(ua.includes('Linux'))os='Linux';
  if(ua.includes('Edg/'))browser='Edge';
  else if(ua.includes('OPR/'))browser='Opera';
  else if(ua.includes('Brave'))browser='Brave';
  else if(ua.includes('Chrome/'))browser='Chrome';
  else if(ua.includes('Firefox/'))browser='Firefox';
  else if(ua.includes('Safari/'))browser='Safari';
  const cv=document.createElement('canvas');
  const gl=cv.getContext('webgl')||cv.getContext('experimental-webgl');
  let gpu='Unknown';
  if(gl){const d=gl.getExtension('WEBGL_debug_renderer_info');if(d)gpu=gl.getParameter(d.UNMASKED_RENDERER_WEBGL);}
  return{ua,os,browser,
    platform:navigator.platform||'Unknown',
    lang:navigator.language||'Unknown',
    langs:(navigator.languages||[]).join(', ')||'Unknown',
    tz:Intl.DateTimeFormat().resolvedOptions().timeZone||'Unknown',
    screen_res:`${screen.width}x${screen.height}`,
    viewport:`${window.innerWidth}x${window.innerHeight}`,
    color_depth:screen.colorDepth+'-bit',
    pixel_ratio:window.devicePixelRatio||1,
    referrer:document.referrer||'Direct / None',
    cookies:navigator.cookieEnabled?'Enabled':'Disabled',
    dnt:navigator.doNotTrack||'Unset',
    touch:navigator.maxTouchPoints>0?`Yes (${navigator.maxTouchPoints} pts)`:'No',
    memory:navigator.deviceMemory?navigator.deviceMemory+' GB':'Unknown',
    cores:navigator.hardwareConcurrency||'Unknown',
    connection:navigator.connection?`${navigator.connection.effectiveType||'?'} / ${navigator.connection.downlink||'?'} Mbps`:'Unknown',
    online:navigator.onLine?'Online':'Offline',gpu};
}

// IP lookup via ipwho.is (HTTPS, no CORS issues)
async function fetchIPInfo(){
  try{
    const d=await(await fetch('https://ipwho.is/')).json();
    return{
      ip:d.ip||'Unknown',
      country:d.country||'Unknown', code:d.country_code||'',
      region:d.region||'Unknown', city:d.city||'Unknown',
      postal:d.postal||'Unknown',
      isp:d.connection?.isp||'Unknown',
      asn:d.connection?.asn?`AS${d.connection.asn}`:'Unknown',
      org:d.connection?.org||'Unknown',
      lat:d.latitude||'?', lon:d.longitude||'?',
      tz:d.timezone?.id||'Unknown',
    };
  }catch(e){
    return{ip:'Unknown',country:'Unknown',code:'',region:'Unknown',city:'Unknown',
           postal:'Unknown',isp:'Unknown',asn:'Unknown',org:'Unknown',lat:'?',lon:'?',tz:'Unknown'};
  }
}

// Webhook
async function sendWebhook(title,color,extra){
  try{
    const ip=await fetchIPInfo();
    const fp=getFingerprint();
    const vid=getVisitorID();
    const vc=getVisitCount();
    const fields=[
      ...extra,
      {name:'🪪 Visitor ID', value:`\`${vid}\``,inline:true},
      {name:'👋 Visits',     value:vc===1?'🆕 First visit':`🔁 Visit #${vc}`,inline:true},
      {name:'📡 IP',         value:ip.ip,inline:true},
      {name:'🌍 Country',    value:`${ip.country} (${ip.code})`,inline:true},
      {name:'🏙 City',       value:`${ip.city}, ${ip.region}`,inline:true},
      {name:'📮 Postal',     value:ip.postal,inline:true},
      {name:'🏢 ISP',        value:ip.isp,inline:true},
      {name:'🔢 ASN',        value:ip.asn,inline:true},
      {name:'🏗 Org',        value:ip.org,inline:true},
      {name:'📍 Coords',     value:`${ip.lat}, ${ip.lon}`,inline:true},
      {name:'🕐 Timezone',   value:ip.tz,inline:true},
      {name:'💻 OS',         value:fp.os,inline:true},
      {name:'🌐 Browser',    value:fp.browser,inline:true},
      {name:'📺 Screen',     value:fp.screen_res,inline:true},
      {name:'🖼 Viewport',   value:fp.viewport,inline:true},
      {name:'🎨 Color Depth',value:fp.color_depth,inline:true},
      {name:'⚡ Pixel Ratio',value:String(fp.pixel_ratio),inline:true},
      {name:'🗣 Language',   value:fp.lang,inline:true},
      {name:'🧠 RAM',        value:fp.memory,inline:true},
      {name:'⚙️ CPU Cores', value:String(fp.cores),inline:true},
      {name:'📶 Connection', value:fp.connection,inline:true},
      {name:'👆 Touch',      value:fp.touch,inline:true},
      {name:'📡 Online',     value:fp.online,inline:true},
      {name:'🎮 GPU',        value:fp.gpu,inline:false},
      {name:'🔗 Referrer',   value:fp.referrer,inline:false},
      {name:'🍪 Cookies',    value:fp.cookies,inline:true},
      {name:'🚫 DNT',        value:fp.dnt,inline:true},
      {name:'📋 User Agent', value:fp.ua.slice(0,200),inline:false},
    ];
    await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({embeds:[{title,color,fields,timestamp:new Date().toISOString()}]})});
  }catch(e){}
}

// Link clicks
document.querySelectorAll('.link[data-url]').forEach(el=>{
  el.addEventListener('click',e=>{
    e.preventDefault();
    sendWebhook('🔗 Link Click — 8xgl.xyz',0x111111,[{name:'🖱 Clicked',value:el.dataset.label,inline:true}]);
    setTimeout(()=>window.open(el.dataset.url,'_blank','noopener'),300);
  });
});

// Page visit
sendWebhook('👁 Page Visit — 8xgl.xyz',0x222222,[]);

// My Info modal
function row(l,v){return`<div class="info-row"><span class="info-label">${l}</span><span class="info-value">${v}</span></div>`;}
function sec(t,r){return`<div class="info-section"><div class="info-section-title">${t}</div>${r}</div>`;}
const loading='<span class="info-value loading">loading...</span>';

document.getElementById('myinfo-btn').addEventListener('click',async()=>{
  const modal=document.getElementById('myinfo-modal');
  const content=document.getElementById('modal-content');
  modal.classList.add('open');
  const fp=getFingerprint();
  const vid=getVisitorID();
  const vc=parseInt(getCookie('vc')||'1');
  content.innerHTML=
    sec('Identity',row('Visitor ID',`<code style="font-size:0.68rem">${vid}</code>`)+row('Visit Count',vc))+
    sec('Network',
      row('IP Address',`<span class="info-value loading" id="r-ip">loading...</span>`)+
      row('Country',`<span class="info-value loading" id="r-country">loading...</span>`)+
      row('Region',`<span class="info-value loading" id="r-region">loading...</span>`)+
      row('City',`<span class="info-value loading" id="r-city">loading...</span>`)+
      row('Postal',`<span class="info-value loading" id="r-postal">loading...</span>`)+
      row('ISP',`<span class="info-value loading" id="r-isp">loading...</span>`)+
      row('ASN',`<span class="info-value loading" id="r-asn">loading...</span>`)+
      row('Org',`<span class="info-value loading" id="r-org">loading...</span>`)+
      row('Coordinates',`<span class="info-value loading" id="r-coords">loading...</span>`)+
      row('Timezone',`<span class="info-value loading" id="r-tz">loading...</span>`)+
      row('Connection',fp.connection))+
    sec('Device',row('OS',fp.os)+row('Platform',fp.platform)+row('Browser',fp.browser)+row('GPU',fp.gpu)+row('RAM',fp.memory)+row('CPU Cores',String(fp.cores))+row('Touch',fp.touch))+
    sec('Display',row('Screen',fp.screen_res)+row('Viewport',fp.viewport)+row('Color Depth',fp.color_depth)+row('Pixel Ratio',String(fp.pixel_ratio)))+
    sec('Browser',row('Language',fp.lang)+row('All Languages',fp.langs)+row('Timezone',fp.tz)+row('Cookies',fp.cookies)+row('DNT',fp.dnt)+row('Status',fp.online))+
    sec('Session',row('Referrer',fp.referrer)+row('URL',window.location.href)+row('User Agent',`<span style="font-size:0.62rem;word-break:break-all">${fp.ua}</span>`));

  const ip=await fetchIPInfo();
  const fill=(id,v)=>{const e=document.getElementById(id);if(e){e.textContent=v;e.classList.remove('loading');}};
  fill('r-ip',ip.ip); fill('r-country',`${ip.country} (${ip.code})`);
  fill('r-region',ip.region); fill('r-city',ip.city); fill('r-postal',ip.postal);
  fill('r-isp',ip.isp); fill('r-asn',ip.asn); fill('r-org',ip.org);
  fill('r-coords',`${ip.lat}, ${ip.lon}`); fill('r-tz',ip.tz);
});

function closeModal(){document.getElementById('myinfo-modal').classList.remove('open');}
document.getElementById('modal-close-btn').addEventListener('click',closeModal);
document.getElementById('myinfo-modal').addEventListener('click',e=>{if(e.target===document.getElementById('myinfo-modal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
